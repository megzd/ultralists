{% load static %}

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <title>To-Do lists</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="{% static 'lists/css/bootstrap.min.css' %}" rel="stylesheet">
    </head>

    <body>
        <div class="container">

            <div class="row justify-content-center p-5 bg-body-tertiary rounded-3">
                <div class="col-lg-8 text-center">
                    <h1 class="display-1 mb-4">{% block header_text %}{% endblock %}</h1>

                    <form method="POST" action="{% block form_action %}{% endblock %}">
                        <!-- name="" represents the key in a dictionary-like data within the POST's body -->
                        <input
                            id="id_text"
                            name="text"
                            class="form-control form-control-lg {% if form.errors %}is-invalid{% endif %}"
                            placeholder="Enter a to-do item"
                            value="{{ form.text.value | default:'' }}"
                            aria-describedby="id_text_feedback"
                            required
                        />
                        {% csrf_token %}

                        {% if form.errors %}
                            <!-- .0 to avoid displaying the error in a <ul> list -->
                            <div id="id_text_feedback" class="invalid-feedback">{{ form.errors.text.0 }}</div>
                        {% endif %}
                    </form>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    {% block table %}
                    {% endblock %}
                </div>
            </div>

        </div>
    </body>
</html>
